<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncCli</title>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 20px;
        }

        h1 { text-align: center; color: #38bdf8; }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: none;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #22c55e;
            color: white;
        }

        .status {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📋 SyncCli</h1>
    <div class="subtitle">Escaneie no celular ou cole texto abaixo</div>

    <div id="qrcode"></div>
    <div id="roomDisplay" class="subtitle"></div>

    <textarea id="message" placeholder="Cole aqui..."></textarea>
    <button onclick="sendMessage()">Enviar</button>

    <div id="status" class="status"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let roomId = params.get("roomId");

    // se não tiver room → gera (PC)
    if (!roomId) {
        roomId = Math.random().toString(36).substring(2, 8);

        const url = `${window.location.origin}?roomId=${roomId}`;

        QRCode.toCanvas(document.createElement('canvas'), url, function (err, canvas) {
            document.getElementById("qrcode").appendChild(canvas);
        });

        document.getElementById("roomDisplay").textContent = "Código: " + roomId;
    }

    const socket = new WebSocket(`wss://synccli-production.up.railway.app/raw?roomId=${roomId}`);
    const statusEl = document.getElementById("status");

    socket.onopen = () => {
        statusEl.textContent = "Conectado ✅";
    };

    socket.onmessage = async (event) => {
        const text = event.data;
        await navigator.clipboard.writeText(text);
        statusEl.textContent = "Copiado no PC ✅";
    };

    function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value;

        if (!text) {
            statusEl.textContent = "Cole algo antes 😉";
            return;
        }

        socket.send(text);
        statusEl.textContent = "Enviado 🚀";
        input.value = "";
    }
</script>

</body>
</html>
