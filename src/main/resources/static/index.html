<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SyncCli</title>

    <style>
        * { box-sizing: border-box; font-family: sans-serif; }

        body {
            margin: 0;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: white;
            font-size: 18px;
        }

        .status {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📋 SyncCli</h1>
    <div class="subtitle">Do celular → Ctrl+V no PC</div>

    <textarea id="message" placeholder="Cole aqui..."></textarea>
    <button onclick="sendMessage()">Enviar</button>

    <div id="status" class="status">Conectando...</div>
</div>

<script>
    // 🔐 sessão única
    let sessionId = localStorage.getItem("sessionId");
    if (!sessionId) {
        sessionId = crypto.randomUUID();
        localStorage.setItem("sessionId", sessionId);
    }

    const socket = new WebSocket(`wss://synccli-production.up.railway.app/raw?sessionId=${sessionId}`);
    const statusEl = document.getElementById("status");

    socket.onopen = () => {
        statusEl.textContent = "Conectado ✅";
    };

    socket.onmessage = async (event) => {
        const text = event.data;

        // copia no clipboard do PC
        await navigator.clipboard.writeText(text);

        statusEl.textContent = "Copiado no PC ✅";
    };

    function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value;

        if (!text) {
            statusEl.textContent = "Cole um comando antes de enviar 😉";
            return;
        }

        socket.send(text);

        saveHistory(text);

        statusEl.textContent = "Enviado 🚀";
        input.value = "";
    }

    // 💾 histórico local
    function saveHistory(text) {
        let history = JSON.parse(localStorage.getItem("history") || "[]");
        history.unshift(text);
        history = history.slice(0, 10);
        localStorage.setItem("history", JSON.stringify(history));
    }
</script>

</body>
</html>
