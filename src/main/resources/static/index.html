<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>SyncCli</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SyncCli</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;


        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            text-align: center;
        }


        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            resize: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            background: #22c55e;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
            background: #16a34a;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        .status.success {
            color: #22c55e;
        }

        .status.error {
            color: #ef4444;
        }
    </style>
</head>
<body>
<h1>📋 SyncCli</h1>
<p class="subtitle">
    Do celular → Ctrl+V no PC </br>
    Transfira comandos do celular para o clipboard do PC instantaneamente
</p>


<div class="container">


    <textarea id="message" placeholder="Cole aqui o comando..."></textarea>

    <button onclick="sendMessage()">Enviar para o PC</button>

    <div id="status" class="status">Conectando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script>

    const socket = new WebSocket("ws://192.168.0.104:8080/raw");
    const statusEl = document.getElementById("status");

    socket.onopen = () => {
        statusEl.textContent = "Conectado ✅";
        statusEl.className = "status success";
    };

    socket.onerror = () => {
        statusEl.textContent = "Erro de conexão ❌";
        statusEl.className = "status error";
    };

    socket.onclose = () => {
        statusEl.textContent = "Desconectado ⚠️";
        statusEl.className = "status error";
    };

    function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value;

        if(text == ""){
            statusEl.textContent = "Cole ou digite um comando antes de enviar 😉";
            statusEl.className = "status error";
        }

        if (!text) return;

        socket.send(text);

        statusEl.textContent = "Enviado 🚀";
        statusEl.className = "status success";

        input.value = "";
    }
</script>
</body>
</html>
